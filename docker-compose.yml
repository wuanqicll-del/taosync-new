services:
  taosync:
    build:
      context: .
      dockerfile: Dockerfile.base
    container_name: taosync
    ports:
      - "18023:8023"
    volumes:
      # 挂载源码，改后端代码后 restart 即可生效
      - /vol1/1000/docker/测试/taosync-custom:/app
      # 持久化数据库（SQLite），容器重建不丢数据
      - /vol1/1000/docker/测试/taosync-custom:/app/data
      # 持久化前端构建产物，避免被源码挂载覆盖
      - /vol1/1000/docker/测试/taosync-custom:/app/front
    restart: unless-stopped

volumes:
  taosync-data:
  taosync-front:
